<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandearx Wangsa Guna</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --glass-bg-color: rgba(255, 255, 255, 0.08);
            --glass-border-color: rgba(255, 255, 255, 0.15);
            --glass-shadow-color: rgba(0, 0, 0, 0.25);
            --text-light: #eee5c7;
            --text-accent: #8eccff;
            --primary-glow: #0044ff;
            --secondary-glow: #3700ff;
            --panel-bg: rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-light); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #0d0a1b;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('gothinterior.png'); 
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: -1; 
        }

        .glass-panel {
            background: var(--glass-bg-color);
            border: 1px solid var(--glass-border-color);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px var(--glass-shadow-color);
            padding: 20px;
        }
 
        header.profile-container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto 20px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--primary-glow);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            color: var(--text-accent); 
            text-shadow: 0 0 10px var(--primary-glow);
            margin: 0;
        }

        .bio {
            margin-top: 15px;
            max-width: 840px;
            line-height: 1.5;
            align-text: center;
            font-size: 1em;
        }
 
        main.content-grid {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;  
            gap: 20px;
            margin-bottom: 40px;
        }
 
        #projects {
            text-align: left;
        }

        #projects h2, #contact h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--text-accent);
            font-size: 1.2em;
            margin-top: 0;
        }

        .gallery-wrapper {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px;
            scrollbar-width: thin;
        }

        .project-card {
            flex: 0 0 180px;  
            background: var(--panel-bg);
            border: 1px solid var(--glass-border-color);
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: scale(1.05);
            border-color: var(--text-accent);
        }

        .project-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        .card-content { padding: 8px; text-align: center; }
        .card-content h3 { font-size: 0.9em; margin: 5px 0; font-family: 'Orbitron', sans-serif; }
        .card-content p { font-size: 0.7em; opacity: 0.8; margin: 0; }
 
        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start;
        }

        .social-links a {
            width: 60px; height: 60px;
            border-radius: 50%; font-size: 1.2em;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border-color);
            color: white; text-decoration: none; transition: 0.3s;
        }

        .social-links a:hover {
            background: var(--primary-glow);
            transform: translateY(-3px);
        }

        footer { margin-top: auto; padding: 20px; opacity: 0.6; width: 100%; text-align: center; }

        /* Responsive */
        @media (max-width: 768px) {
            main.content-grid { grid-template-columns: 1fr; }
            .profile-top { flex-direction: row; }
        }
    </style>
</head>
<body>
        <!-- bagian profil -->
    <header class="profile-container glass-panel">
        <div class="profile-top">
            <img src="https://ugc.production.linktr.ee/cc7ac80e-b4f4-43ca-a32b-b40673231b1a_cold....png?io=true&size=avatar-v3_0" 
                 alt="Profile" class="profile-pic">
            <h1>Alexandearx Wangsa Guna</h1>
        </div>
        <div class="bio">
            <p>Sudoku enthusiast applying logic and strategy to build clean interfaces with HTML, CSS, and JS.</p>
        </div>
    </header>

    <main class="content-grid">
        <!-- bagian projek -->
        <section id="projects" class="glass-panel">
            <h2>Project</h2>
            <div class="gallery-wrapper">
                <div class="project-card" onclick="window.open('https://mrscaramanga.github.io/sudoku/', '_blank')">
                    <img src="icon.png" alt="Dark Sudoku">
                    <div class="card-content">
                        <h3>Dark Sudoku</h3>
                        <p>Vanilla JS Logic</p>
                    </div>
                </div>
                <div class="project-card" onclick="window.open('https://mrscaramanga.github.io/idiomcards/', '_blank')">
                    <img src="idiomcards.jpg" alt="Idiom Cards">
                    <div class="card-content">
                        <h3>Idiom Cards</h3>
                        <p>Educational APK</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- bagian social -->
        <section id="contact" class="glass-panel">
            <h2>Connect</h2>
            <div class="social-links">
                <a href="https://www.instagram.com/topsudokusolver" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://t.me/sudokusolver" target="_blank" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
                <a href="https://open.spotify.com/user/pm3cpwdic6c2s3thp46g288ik?si=11ec49855ec348b6" target="_blank" title="Spotify"><i class="fab fa-spotify"></i></a>
                <a href="https://linktr.ee/wangsaguna" target="_blank" title="Linktree"><i class="fa-solid fa-link"></i></a>
                <a href="https://mysteriousfile88.wordpress.com" target="_blank" title="WordPress"><i class="fab fa-wordpress"></i></a>
                <a href="https://filewangsaguna.blogspot.com" target="_blank" title="Mytery Files"><i class="fa-solid fa-puzzle-piece"></i></a>
                <a href="https://alexandearx.blogspot.com" target="_blank" title="Ancient Story"><i class="fa-solid fa-book-quran"></i></a>
            </div>
        </section>
    </main>

    <footer>&copy; 2026 Alexandearx. CV MHG.</footer>

</body>
</html>
